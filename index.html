<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
<canvas id="particles"></canvas>  <!-- ⭐ NEW -->

<div class="container">
  <h1>💰 Expense Tracker</h1>

  <div class="balance-card">
    <h3>Balance</h3>
    <h2 id="balance">₹0</h2>
  </div>

  <div class="dashboard">
    <div class="card income">
      <h4>Income</h4>
      <p id="income">₹0</p>
    </div>

    <div class="card expense">
      <h4>Expense</h4>
      <p id="expense">₹0</p>
    </div>
  </div>

  <!-- INPUTS -->
  <input type="text" id="desc" placeholder="Enter description">
  <input type="number" id="amount" placeholder="Enter amount">

  <select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Bills</option>
    <option>Other</option>
  </select>

  <button onclick="addTransaction()">➕ Add Transaction</button>

  <!-- NEW BUTTON -->
  <button onclick="goToInsights()">📊 View Insights</button>
  <button onclick="resetData()" style="background:red;color:white;padding:10px;margin-top:10px;">
  🔄 Reset Data
</button>


  <!-- SEARCH -->
  <input type="text" id="search" placeholder="Search transactions" onkeyup="filterTransactions()">

  <!-- LIST -->
  <ul id="list"></ul>

</div>
<footer>
  <p>Created By Juhi Jahan T S</p>
</footer>

<script src="js/particles.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
